<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Weight Tracker</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- CABECERA -->
<div class="page-header">
  <div class="page" style="padding-bottom:0">
    <h1 id="greeting">Registra tu progreso</h1>
    <p class="subtitle" id="headerDate">Hoy</p>
  </div>
</div>

<div class="page">

  <!-- SELECTOR DE FECHA -->
  <div class="date-bar">
    <button class="btn-icon" id="prevDayBtn" title="Día anterior" style="border:none;background:none;font-size:1.2rem;cursor:pointer;padding:4px 8px;">‹</button>
    <input type="date" id="dateInput" style="flex:1;text-align:center;" />
    <button class="btn-icon" id="nextDayBtn" title="Día siguiente" style="border:none;background:none;font-size:1.2rem;cursor:pointer;padding:4px 8px;">›</button>
    <button class="btn btn-ghost btn-sm" id="todayBtn">Hoy</button>
  </div>

  <!-- RESUMEN DEL DÍA (si ya existe) -->
  <div class="day-summary hidden" id="daySummary">
    <svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--success)" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="daySummaryText"></span>
  </div>

  <!-- HERO: PESO -->
  <div class="weight-hero">
    <span class="weight-label">Peso del día</span>
    <div class="weight-input-row">
      <input
        type="number"
        id="weightInput"
        class="weight-input"
        placeholder="0.0"
        step="0.1"
        min="30"
        max="300"
        inputmode="decimal"
      >
      <span class="weight-unit">kg</span>
    </div>

    <div class="form-group">
      <label class="form-label">Calorías totales del día (kcal)</label>
      <input type="number" id="kcalTotal" class="form-input" placeholder="2000" min="0" max="10000" inputmode="numeric">
    </div>

    <button class="btn btn-primary btn-block" id="saveBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Guardar
    </button>

    <button class="btn btn-ghost btn-block mt-8" id="toggleOptBtn">+ Más detalles (opcionales)</button>
  </div>

  <!-- CAMPOS OPCIONALES -->
  <div class="toggle-section" id="optionalSection">
    <div class="card">
      <p class="card-title">Desglose de comidas</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Desayuno</label>
          <input type="number" id="kcalBreakfast" class="form-input" placeholder="400" inputmode="numeric">
        </div>
        <div class="form-group">
          <label class="form-label">Comida</label>
          <input type="number" id="kcalLunch" class="form-input" placeholder="700" inputmode="numeric">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cena</label>
          <input type="number" id="kcalDinner" class="form-input" placeholder="600" inputmode="numeric">
        </div>
        <div class="form-group">
          <label class="form-label">Snacks</label>
          <input type="number" id="kcalSnacks" class="form-input" placeholder="200" inputmode="numeric">
        </div>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label class="form-label">Kcal quemadas — ejercicio</label>
        <input type="number" id="kcalActivity" class="form-input" placeholder="Ej: 300" inputmode="numeric">
      </div>

      <div class="form-group mb-0">
        <label class="form-label">Notas del día</label>
        <textarea id="notes" class="form-textarea" placeholder="Cómo me he sentido, qué he comido…"></textarea>
      </div>
    </div>
  </div>

  <!-- QUICK STATS -->
  <div class="section-header mt-8">
    <span class="section-title">Resumen reciente</span>
    <a href="/stats" style="font-size:0.8rem;color:var(--primary);text-decoration:none;font-weight:600;">Ver todo →</a>
  </div>

  <div class="stats-grid">
    <div class="stat-card primary">
      <div class="stat-value" id="statLastWeight">—</div>
      <div class="stat-label">Último peso</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvg7">—</div>
      <div class="stat-label">Media 7 días</div>
    </div>
    <div class="stat-card" id="statDiffCard">
      <div class="stat-value" id="statDiff">—</div>
      <div class="stat-label">Cambio semanal</div>
    </div>
  </div>

</div>

<!-- NAVEGACIÓN INFERIOR -->
<nav class="bottom-nav">
  <a href="/" class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Inicio</span>
  </a>
  <a href="/history" class="nav-item">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>Historial</span>
  </a>
  <a href="/stats" class="nav-item">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Stats</span>
  </a>
  <a href="/settings" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Ajustes</span>
  </a>
</nav>

<script src="/js/app.js"></script>
<script src="/js/home.js"></script>
<script>
  // Soporte para abrir con ?date=YYYY-MM-DD desde historial
  const urlDate = new URLSearchParams(location.search).get('date');
  if (urlDate) {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('dateInput').value = urlDate;
      // home.js lo detectará al inicializar
    });
  }
  // Greeting dinámico
  document.addEventListener('DOMContentLoaded', () => {
    const h = new Date().getHours();
    const greet = h < 12 ? 'Buenos días' : h < 20 ? 'Buenas tardes' : 'Buenas noches';
    document.getElementById('greeting').textContent = greet;
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });

    // Si viene fecha por URL, usarla
    if (urlDate && document.getElementById('dateInput')) {
      currentDate = urlDate;
      document.getElementById('dateInput').value = urlDate;
      openOptional();
      loadDayData();
    }
  });
</script>
</body>
</html>
