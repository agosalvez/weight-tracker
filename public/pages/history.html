<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Historial – Weight Tracker</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- CABECERA -->
<div class="page-header">
  <div class="page" style="padding-bottom:0">
    <h1>Historial</h1>
    <p class="subtitle" id="logCount">Cargando…</p>
  </div>
</div>

<div class="page">

  <!-- FILTRO -->
  <div class="filter-bar">
    <div class="form-group">
      <label class="form-label">Desde</label>
      <input type="date" id="filterFrom" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Hasta</label>
      <input type="date" id="filterTo" class="form-input">
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-primary btn-sm" id="filterBtn">Filtrar</button>
      <button class="btn btn-ghost btn-sm" id="clearFilterBtn">Limpiar</button>
    </div>
  </div>

  <!-- LISTA DE REGISTROS -->
  <div id="logList">
    <div class="loader"><div class="spinner"></div></div>
  </div>

</div>

<!-- NAVEGACIÓN INFERIOR -->
<nav class="bottom-nav">
  <a href="/" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Inicio</span>
  </a>
  <a href="/history" class="nav-item active">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>Historial</span>
  </a>
  <a href="/stats" class="nav-item">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Stats</span>
  </a>
  <a href="/settings" class="nav-item">

    <span>Ajustes</span>
  </a>
</nav>

<script src="/js/app.js"></script>
<script src="/js/history.js"></script>
</body>
</html>
